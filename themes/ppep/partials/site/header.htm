[viewBag]

[staticMenu navMain]
code = "main-menu"
==
<header id="header" class="has-background-white">
    <div class="header-top">
        <div class="container">
            <div class="columns is-mobile">
                <div class="column is-one-third">
                 {# {% if this.theme.phone %}
                        <a href="tel:{{ this.theme.phone|preg_replace('/[^0-9]/', '') }}"><i class="fas fa-phone"></i> {{ this.theme.phone }}</a>
                    {% endif %} #}
                    <a href="https://franklingroupusa.com/" target="_blank"><img style="height:30px;" src="/storage/app/media/assets/FG-logo.jpg"></a>
                </div>
                <div class="column is-two-thirds">
                    <a class="is-pulled-right" href="mailto:{{ this.theme.email }}"><i class="fas fa-envelope"></i> {{ this.theme.email }}</a>
                </div>
            </div>
        </div>
    </div>
    <div class="hero is-small">
        <div class="hero-body">
            <a class="logo" href="{{ 'home'|staticPage }}">
                <img class="is-block" src="{{ this.theme.logo|media }}" alt="{{ this.theme.logo_alt }}">
            </a>
        </div>
    </div>
    <nav class="navbar is-primary" role="navigation" aria-label="main navigation">
        <div id="navbarBasicExample" class="navbar-menu">
            <div class="navbar-start navbar-center justify-content-center">
                {% component 'navMain' %}
            </div>
        </div>
    </nav>
</header>
