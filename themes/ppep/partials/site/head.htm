<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-168012149-2"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'UA-168012149-2');
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

{% placeholder head default %}
    <title>{{ this.page.meta_title|default(this.page.title) }} - {{ this.theme.site_name }}</title>
    {% if this.page.meta_description %}
        <meta name="description" content="{{ this.page.meta_description }}">
    {% endif %}
{% endplaceholder %}

]|theme }}" rel="stylesheet">
